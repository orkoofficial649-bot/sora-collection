<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Order | SORA Collection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #fff9f9; }
        .serif { font-family: 'Playfair Display', serif; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .input-style { 
            width: 100%; padding: 0.75rem 1rem; border: 1px solid #e5e7eb; 
            border-radius: 0.75rem; outline: none; transition: all 0.3s;
        }
        .input-style:focus { border-color: #b91c1c; ring: 2px; ring-color: #fecaca; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-xl mx-auto glass shadow-2xl rounded-3xl overflow-hidden border border-red-100 mb-10">
        <div class="bg-red-700 p-8 text-center text-white">
            <img src="https://i.ibb.co.com/p68Bsn52/Gemini-Generated-Image-uph57euph57euph5-removebg-preview.png" class="h-16 mx-auto mb-4 brightness-0 invert" alt="SORA Logo">
            <h1 class="text-3xl serif uppercase tracking-widest">SORA Collection</h1>
            <p class="text-sm opacity-80 mt-2 font-light tracking-wide uppercase">Defining Your Grace, Every Single Day.</p>
        </div>

        <div class="p-6 md:p-10">
            <h2 class="text-xl font-bold text-gray-800 text-center mb-8 border-b pb-4">অর্ডার দিতে নিচের ফর্মটি পূরণ করুন</h2>

            <form id="orderForm" class="space-y-5">
                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">আপনার নাম</label>
                    <input type="text" name="name" required class="input-style" placeholder="উদা: আরকো বর্মন">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">ফোন নম্বর</label>
                    <input type="tel" name="phone" required class="input-style" placeholder="017XXXXXXXX">
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">পুরো ঠিকানা</label>
                    <textarea name="address" required rows="3" class="input-style" placeholder="গ্রাম/রাস্তা, থানা, জেলা"></textarea>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">পেমেন্ট মাধ্যম</label>
                    <select name="payment_method" required class="input-style bg-white">
                        <option value="">সিলেক্ট করুন</option>
                        <option value="bKash">bKash</option>
                        <option value="Nagad">Nagad</option>
                        <option value="Rocket">Rocket</option>
                    </select>
                </div>

                <div class="bg-red-50 p-5 rounded-2xl border border-red-100 space-y-3">
                    <p class="text-[12px] text-red-700 font-bold text-center leading-tight">
                        ডেলিভারি চার্জটি নিচের নাম্বারে পেমেন্ট করুন: <br> 
                        <span class="text-gray-600 font-medium">(ঢাকার ভিতরে ১০০ টাকা, ঢাকার বাইরে ১৩০ টাকা)</span>
                    </p>
                    <div class="flex items-center justify-between bg-white p-3 rounded-xl border border-red-200">
                        <span id="paymentNum" class="font-bold text-gray-800 tracking-wider text-lg">017XXXXXXXX</span>
                        <button type="button" onclick="copyNumber()" class="text-xs bg-red-700 text-white px-4 py-2 rounded-lg font-bold hover:bg-red-800 transition uppercase tracking-tighter">Copy Number</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">Transaction ID</label>
                        <input type="text" name="trxid" required class="input-style" placeholder="ABC123XYZ">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase mb-1 ml-1">আপনার পেমেন্ট নম্বর</label>
                        <input type="tel" name="payment_number" required class="input-style" placeholder="যে নম্বর থেকে টাকা পাঠিয়েছেন">
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-red-700 text-white font-bold py-5 rounded-2xl hover:bg-red-800 transition-all shadow-xl active:scale-95 text-lg tracking-widest uppercase mt-4">
                    CONFIRM ORDER
                </button>
            </form>
            
            <p class="text-center text-[10px] text-gray-400 mt-8 uppercase tracking-widest">&copy; 2026 SORA Collection. Quality Guaranteed.</p>
        </div>
    </div>

    <script>
        // Copy Number Function
        function copyNumber() {
            const num = document.getElementById('paymentNum').innerText;
            navigator.clipboard.writeText(num);
            alert("Payment Number Copied!");
        }

        // Form Submit to Google Sheets
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxbzzY58sxvhoOTfn5kvLgK2QIsNkAHew6NYUDgN4epIU81oDRl9OWsPCykICFc1LXH5Q/exec';
        const form = document.getElementById('orderForm');
        const btn = document.getElementById('submitBtn');

        form.addEventListener('submit', e => {
            e.preventDefault();
            btn.disabled = true;
            btn.innerText = "SENDING ORDER...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            fetch(scriptURL, { method: 'POST', body: new FormData(form)})
            .then(response => {
                alert("ধন্যবাদ! আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে। শীঘ্রই আমাদের প্রতিনিধি আপনার সাথে যোগাযোগ করবেন।");
                form.reset();
                btn.disabled = false;
                btn.innerText = "CONFIRM ORDER";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert("দুঃখিত, অর্ডারটি পাঠানো সম্ভব হয়নি। আবার চেষ্টা করুন।");
                btn.disabled = false;
                btn.innerText = "CONFIRM ORDER";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        });
    </script>
</body>
</html>
