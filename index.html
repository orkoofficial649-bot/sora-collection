<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SORA Collection | Define Your Grace</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; scroll-behavior: smooth; background-color: #fffafb; }
        .serif { font-family: 'Playfair Display', serif; }
        
        /* Updated Hero Section with correct Image Link */
        .hero-section { 
            position: relative;
            height: 85vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            text-align: center; 
            color: white; 
            overflow: hidden;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('https://i.ibb.co.com/HpRCPKZW/Define-your-grace-every-single-day.png');
            background-size: cover;
            background-position: center;
        }

        .stylish-title {
            font-size: clamp(2.5rem, 8vw, 5rem);
            line-height: 1.1;
            text-shadow: 2px 4px 10px rgba(0, 0, 0, 0.3);
            letter-spacing: -1px;
        }

        .btn-premium {
            background: linear-gradient(45deg, #b91c1c, #7f1d1d);
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px -5px rgba(185, 28, 28, 0.4);
        }
        .btn-premium:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(185, 28, 28, 0.6); }
    </style>
</head>
<body>

    <header class="hero-section">
        <div class="relative z-10 px-4" data-aos="zoom-out" data-aos-duration="1500">
            <h1 class="stylish-title serif font-bold mb-4 italic">Welcome to <br> <span class="not-italic tracking-[0.1em] uppercase">SORA Collection</span></h1>
            <p class="text-lg md:text-2xl font-light tracking-[0.3em] uppercase opacity-90 border-t border-b border-white/30 py-2 inline-block">Choose your product for order</p>
            <div class="mt-12 animate-bounce">
                <svg class="w-8 h-8 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-20 px-5">
        <div class="mb-32 text-center" data-aos="fade-up">
            <div class="overflow-hidden rounded-[2rem] shadow-2xl bg-white border border-red-50">
                <img src="https://i.ibb.co.com/NHCtW45/Untitled-design-13.png" alt="Kashmiri Bangles" class="w-full max-h-[600px] object-cover">
                <div class="p-8">
                    <h2 class="text-3xl serif text-gray-900 mb-2">Kashmiri Bangles with 4 Pics Ghungru</h2>
                    <p class="text-red-700 text-2xl font-bold mb-6">Price: 450 Taka</p>
                    <a href="order.html" class="inline-block btn-premium text-white px-12 py-4 rounded-full font-bold tracking-widest uppercase text-sm">Order Now</a>
                </div>
            </div>
        </div>

        <div class="mb-32 text-center" data-aos="fade-up">
            <div class="overflow-hidden rounded-[2rem] shadow-2xl bg-white border border-red-50">
                <img src="https://i.ibb.co.com/vCW1bzNx/Untitled-design-17.png" alt="Velvet Churi" class="w-full max-h-[600px] object-cover">
                <div class="p-8">
                    <h2 class="text-3xl serif text-gray-900 mb-2">Velvet Churi</h2>
                    <p class="text-red-700 text-2xl font-bold mb-6">Price: 200 Taka</p>
                    <a href="order.html" class="inline-block btn-premium text-white px-12 py-4 rounded-full font-bold tracking-widest uppercase text-sm">Order Now</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-white pt-20 pb-10 border-t border-gray-100 text-center">
        <img src="https://i.ibb.co.com/4R143dCb/Gemini-Generated-Image-uph57euph57euph5-removebg-preview.png" class="h-20 mx-auto mb-4">
        <p class="text-sm text-gray-500">Contact: 01960848956 | soracollection.help@gmail.com</p>
        <p class="text-[10px] mt-8 text-gray-400 uppercase tracking-widest">&copy; 2026 SORA Collection</p>
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>AOS.init({ duration: 1000, once: true });</script>
</body>
</html>
